version = 1
id = "tw-earnings-fetch"
kind = "cron"
name = "tw-earnings-fetch"
prompt = "執行台股法說會待抓取清單通知與遠端關帳檢查。先讀取 ~/.codex/automations/tw-earnings-fetch/memory.md，再讀取 ~/.codex/skills/report-intake/SKILL.md 中的 Obsidian 規則作為背景。\n\n先執行 ~/.codex/automation-tools/tw-earnings-fetch-tool/list-pending.sh。工具預設使用 $TW_EARNINGS_REPO；若未設定則使用 $HOME/Desktop/python/investment-data，vault 預設使用 $OBSIDIAN_VAULT_PATH；若未設定則使用本機 iCloud Obsidian vault。嚴格 remote-first：必須 git fetch origin，且只讀 origin/main:sources/tw-earnings/pending-list.json；不要 git pull、不要覆寫本機 dirty worktree。若 fetch、遠端檔案、runtime manual-resolutions.json 或其格式不可用，必須 fail closed，將失敗摘要寫入 ~/.codex/automations/tw-earnings-fetch/last-run.md 後停止；不得用本機 stale pending-list 補空白。只有使用者明確設定 TW_EARNINGS_ALLOW_CACHED_ORIGIN=1 時才可用 cached origin，且 last-run 與回覆都要標明可能 stale。\n\n完整清單必須交叉比對本機 raw、output、Obsidian TW/US-Earnings 與 runtime 人工略過紀錄，將 pending 與 fetch_failed 候選分成三桶：真正待抓、已處理但遠端未關閉、已依使用者指示略過但遠端仍 pending。每列輸出公司、日期、狀態與 https://www.alphamemo.ai/free-transcripts/{id} 連結。\n\n只有當「真正待抓」嚴格等於 0，且另外兩個已解析桶任一大於 0，才執行 ~/.codex/automation-tools/tw-earnings-fetch-tool/close-resolved.sh。關帳工具會用乾淨 clone 更新 origin/main 的 sources/tw-earnings/pending-list.json、sources/tw-earnings/state.json，並把可確認的 local raw/output 補進遠端；不會 git pull，也不會覆寫本機 dirty worktree。關帳成功後必須重跑 list-pending.sh，確認遠端狀態已關閉；失敗則確認 ~/.codex/automations/tw-earnings-fetch/last-close.md 已有失敗摘要，並在回覆與 memory 中說明。\n\n本排程只做清單通知與關帳同步，不爬蟲、不開瀏覽器、不抓逐字稿、不跑 DeepSeek、不寫 Obsidian。實際逐字稿同步由 investment-data/scripts/investment-sync.sh 負責，台股寫入 2 Sources/TW-Earnings/，國際公司寫入 2 Sources/US-Earnings/。若 repo dirty、behind、網路受限、遠端不可讀、push 失敗或只能 cached origin，都要在 last-run／last-close 與回覆說清楚。最後確認 ~/.codex/automations/tw-earnings-fetch/last-run.md 已含完整分桶或失敗摘要，並更新 ~/.codex/automations/tw-earnings-fetch/memory.md。"
rrule = "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR,SA,SU;BYHOUR=8;BYMINUTE=30"
model = "gpt-5.5"
reasoning_effort = "high"
execution_environment = "local"
