name = "元件供需雷達：Future vs 華強電子網"
prompt = "每週追蹤 Future Electronics Market Conditions Report 與華強電子網公開資料，比對各類電子零組件供需、交期、價格與現貨熱度變化，輸出繁體中文投資研究報告。完整週報與原始資料保留在 automation 資料夾；Obsidian 只更新單一時間軸筆記，不要每週新增完整報告筆記。排程跑完時，必須在對話中直接貼一份精簡分析報告，不可以只回覆檔案路徑。\n\n這是一個正式追蹤系統，不是一般新聞搜尋。核心設計、來源表、探測腳本、報告生成腳本在：\n/Users/yuukilin/.codex/automations/component-market-tracker/\n\n先閱讀：\n- /Users/yuukilin/.codex/automations/component-market-tracker/README.md\n- /Users/yuukilin/.codex/automations/component-market-tracker/config/source-map.json\n- /Users/yuukilin/.codex/automations/component-market-tracker/memory.md\n\n基本規則：\n- 第一個工具動作先確認台北時間。\n- 全文使用繁體中文，避免簡體字與中國大陸慣用語；能翻中文的術語都翻中文，必要英文只保留來源名、品牌、縮寫與料號。\n- 使用者是業外投資研究者，不是電子零件採購或硬體工程師。報告主體先講缺貨更緊、價格/成本壓力、交期拉長與可追投資題材；料號榜放附錄，不放主結論前面。\n- 涉及最新狀態、價格、供需、交期、新聞或市場資料時，必須重新查證，不得用舊記憶代替。\n- 不確定就寫「我不確定」；資料不足就寫「我搜到的資料不足以回答這個問題」。\n- 只追 Future Electronics 與華強電子網，不擴散成一般新聞彙整。華強商城只作備援，不列核心比對。\n\n核心來源：\n1. Future Electronics\n   - Landing page：https://www.futureelectronics.com/resources/market-conditions-report\n   - PDF：https://media.futureelectronics.com/doc/Market-Conditions-Report.pdf\n   - 10 個分類頁：analog、batteries、connectivity-solutions、discretes、electromechanical、high-end、interconnect、lighting-solutions、memory、passives。\n   - 最佳抓法：先抓 landing page 的版本、Last updated、PDF；再抓各分類頁中的 Market Conditions 分類 JPG。分類 JPG 是 Future 的主要結構化來源；PDF 作完整歸檔與 fallback。\n2. 華強電子網\n   - 烽火指數：https://fh.hqew.com/\n   - 雲報價：https://p.hqew.com/\n   - 最佳抓法：烽火指數首頁可直接抽最新四週週期與榜單；雲報價畫面數字可能混淆，必須讀每列網頁背後欄位 pmodel、pproductor、pproductDate、ppackage、quoteNum、quotationPrice、quality、remark，不要直接讀畫面表格數字。\n\n每次執行固定流程：\n1. 設定 RUN_ID=YYYY-MM-DD，使用台北日期。\n2. 先跑來源探測：\n   python3 /Users/yuukilin/.codex/automations/component-market-tracker/scripts/probe_sources.py --date RUN_ID --download-category-images\n   若腳本因網路或網站反爬失敗，先用可用 web / browser 工具重試；仍失敗才在報告中列為資料源異常，不要硬補資料。\n3. 再跑固定報告生成：\n   python3 /Users/yuukilin/.codex/automations/component-market-tracker/scripts/generate_report.py --run-id RUN_ID\n   這支腳本會讀實際 snapshot schema、補 missing OCR、輸出 summary JSON、Markdown report，並更新同一份 Obsidian 時間軸。\n4. 讀取生成後的 Markdown report、summary JSON、Obsidian 時間軸做 sanity check：\n   - 來源健康檢查不可是空表。\n   - Future 分類頁應檢查 10 個分類；圖片文字辨識檔數要列出。\n   - 華強烽火指數應有最新週期、型號熱度、品牌熱度、品類熱度。\n   - 華強雲報價應有 hot_quote_rows。\n   - 若本期是第一次有效 snapshot，必須寫基準期，不可宣稱週變化。\n   - Obsidian 不得新增 dated 完整報告，只能更新時間軸筆記。\n5. 若 generate_report.py 失敗或輸出空表，先修抽取或報告生成邏輯；不能直接交付空報告。\n6. 更新 /Users/yuukilin/.codex/automations/component-market-tracker/memory.md，記錄本期日期、來源版本、重要變化、下次要追的項目。\n\n實際 snapshot schema：\n- 頂層欄位：date、generated_at_taipei、source_health、future、hqew。\n- 常用欄位：future.last_updated、future.categories、source_health.future_pdf、hqew.fire_index.periods、hqew.fire_index.model_heat_rank、hqew.fire_index.brand_heat_rank、hqew.fire_index.category_heat_rank、hqew.fire_index.category_rising_rank、hqew.cloud_quote.hot_quote_rows。\n- 不要假設存在 sources、future.landing.last_updated_text、hqew.fire_index.model_heat 這類舊草稿欄位。\n\n比對機制：\n- 與上一期 /Users/yuukilin/.codex/automations/component-market-tracker/snapshots/ 中最近一份有效 snapshot 比較。\n- Future 同來源 diff：交期區間變化、趨勢轉緊、價格轉漲、EOL 或 note 新增。\n- 華強同來源 diff：排名變化、搜尋指數變化、較上期百分比、品類連榜、熱門型號新增/消失、雲報價同型號同封裝同批號可比變化。\n- 跨來源 diff：只有 Future 正式通路與華強現貨熱度同方向時，列為高優先追蹤；只有單邊訊號就列在背離與限制。\n\n保存要求：\n- 完整報告：/Users/yuukilin/.codex/automations/component-market-tracker/reports/YYYY-MM-DD-component-market-radar.md\n- 結構化摘要：/Users/yuukilin/.codex/automations/component-market-tracker/snapshots/YYYY-MM-DD-summary.json\n- source-probe：/Users/yuukilin/.codex/automations/component-market-tracker/snapshots/YYYY-MM-DD-source-probe.json\n- raw 抓取檔案：/Users/yuukilin/.codex/automations/component-market-tracker/runs/YYYY-MM-DD/raw/\n- Obsidian 時間軸：/Users/yuukilin/Library/Mobile Documents/iCloud~md~obsidian/Documents/卡片筆記盒模板/2 Sources/Research/2026-07-01-元件供需雷達-Future-華強電子網-時間軸.md\n\n排程任務最後需回報兩層內容：\n1. 對話中的精簡分析報告，必須直接貼在回覆裡，包含：來源是否更新、是否能解讀成新趨勢、跟上一期比、前三大投資題材、需要注意的背離/限制。若來源未更新，要明確寫「本期不應解讀為新趨勢」。\n2. 檔案路徑：完整報告路徑、summary JSON 路徑、Obsidian 時間軸路徑、raw 資料路徑。\n\n最後回覆不要只丟連結或路徑；使用者要在對話裡直接看到可讀的分析結論。"
