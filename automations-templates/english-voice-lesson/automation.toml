prompt = "讀取 /Users/yuukilin/Documents/English/state/course-state.json、/Users/yuukilin/Documents/English/state/review-queue.md、/Users/yuukilin/Documents/English/state/current-session.md；基準到期時再讀取 /Users/yuukilin/Documents/English/state/progress-benchmarks.md。確認主必考句、1 句已到期舊句、中文情境、卡住點、最近課型、整合課與月度基準是否到期，以及是否有進行中課程。\n\n你的任務不是在 Codex 直接開始英文課。不要要求使用者在 Codex 回答英文，不要進入 Echo 練習，不要逐輪寫入任何課程檔案。只產生一張可貼到 ChatGPT Voice 的「語音課開課卡」。\n\n禁止讀取、建立或寫入 /Users/yuukilin/.codex/automations/english-voice-lesson/memory.md，也不要把讀檔、產卡或下一步提醒寫進任何其他 memory；每日提醒不是正式課程紀錄。即使流程尾端通常會整理記憶，本任務也必須略過。\n\n前提：/Users/yuukilin/Documents/English/templates/voice-app-prompt.md 已設成 ChatGPT Project / GPT / 自動化固定指令，不要要求使用者重貼整份 prompt。\n\n請用繁體中文短短提醒使用者去 ChatGPT Voice 上英文課，並完整輸出：\n\n語音課開課卡\n日期：\n建議課型：A Echo 課 / B 情境對話課 / C 修補課 / D 整合課\n下次必考句：\n中文情境：\n到期舊句：\n舊句中文情境：\n目前卡住點：\n今天建議練法：\n今日整合任務：無 / 聽或讀 → 口頭摘要 → 80 到 120 字短寫作 → 不照稿再口述\n月度基準：未到期 / 到期（90 秒日常、90 秒投資、60 到 90 秒聽力＋3 題＋摘要）\n\n請依序考我「下次必考句」與「到期舊句」。如果我答對，就照建議課型繼續；如果我卡住，先短修一次，再換一個新情境讓我重講。\n\n課型選擇順序：\n1. course-state 的 primary_blocker 明確標示尚未修過的重複核心錯誤，優先 C。\n2. 月度基準到期，或最近 7 天沒有 D，建議 D。\n3. 最近連續 A 或 C，建議 B。\n4. 沒有明顯卡點，建議 A。\nD 每 7 天最多一次，口說仍是主軸。\n\n若 current-session.md 有進行中課程，不要直接開新課；提醒使用者先回 Codex 接續、下課整理或丟棄暫存。\n\n提醒使用者：把卡片貼進已設定好 voice-app-prompt.md 的 ChatGPT Voice；下課時說「下課，請輸出語音課同步卡」。回 Codex 後貼完整同步卡並加上「同步語音課」。Codex 收到後才更新 session-log.md、review-queue.md、course-state.json、current-session.md；若完成月度基準，再更新 progress-benchmarks.md。\n\n回覆要短，像提醒卡，不要長篇教學。"
