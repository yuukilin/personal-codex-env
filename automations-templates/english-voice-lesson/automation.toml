prompt = "讀取 /Users/yuukilin/Documents/English/state/course-state.json、/Users/yuukilin/Documents/English/state/review-queue.md、/Users/yuukilin/Documents/English/state/current-session.md；選 D 時再讀取 /Users/yuukilin/Documents/English/curriculum/integrated-lesson-protocol.md，月度基準到期時讀取 /Users/yuukilin/Documents/English/state/progress-benchmarks.md。確認主必考句、最多 1 句到期舊句、卡住點、最近課型、D 課完整完成日／部分完成項目與月度基準狀態。\n\n本任務只產生一張可貼到 ChatGPT Voice 的「語音課開課卡」。不要在 Codex 開始教學、要求使用者回答英文、逐輪寫課程檔案，或讀寫任何 memory。/Users/yuukilin/Documents/English/templates/voice-app-prompt.md 已設為 Voice 固定指令，不要要求重貼。\n\n若 current-session.md 顯示有進行中課程，不產新卡；只提醒使用者先回 Codex 接續、整理下課或丟棄暫存。\n\n用繁體中文簡短輸出：\n\n語音課開課卡\n日期：\n建議課型：A Echo 課 / B 情境對話課 / C 修補課 / D 整合課\n下次必考句：\n中文情境：\n到期舊句：\n舊句中文情境：\n目前卡住點：\n今天建議練法：\n今日整合任務：無 / 聽或讀 → 2 個理解問題 → 口頭摘要 → 80 到 120 字短寫作 → 小修一個 → 不照稿再口述 → exit recall\n月度基準：未到期 / 到期（90 秒日常、90 秒投資、60 到 90 秒聽力＋3 題＋摘要，再做 80 到 120 字短寫作與不照稿口述）\n續航要求：除非我說「下課」「今天到這裡」或 \"stop\"，每次回饋後直接給下一個任務；不要只稱讚、只回 \"You're welcome\"，或等我說「繼續」。\n\n請依序考我「下次必考句」與「到期舊句」。如果我答對，就照建議課型繼續；如果我卡住，先短修一次，再換一個新情境讓我重講。\n\n課型選擇：\n1. primary_blocker 是尚未修過的重複核心錯誤，選 C。\n2. 月度基準到期，或上次 D 只有部分完成，選 D；部分完成時只補未完成項目，不重做已完成項目。\n3. 最近 7 天沒有完整 D，選 D。\n4. 最近連續 A 或 C，選 B。\n5. 沒有明顯卡點，選 A。\n完整 D 每 7 天最多一次；補做前次缺漏不算新的完整 D，口說仍是主軸。\n\n卡片後只提醒：貼進已設定好固定 Prompt 的 ChatGPT Voice；下課時說「下課，請輸出語音課同步卡」；回 Codex 貼完整卡並加上「同步語音課」。回覆保持短。"
rrule = "RRULE:FREQ=WEEKLY;BYHOUR=21;BYMINUTE=0;BYDAY=SU,MO,TU,WE,TH,FR,SA"
