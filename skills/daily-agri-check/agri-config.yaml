contract_policy:
  fallback_tickers_are_hints_only: true
  verify_front_month_each_run: true
  require_nonzero_volume: true
  require_future_last_trade_date: true
  show_quote_session_date: true
  roll_sequence: [F, H, K, N, Q, U, V, X, Z]

paths:
  vault_agri_root: "/Users/yuukilin/Library/Mobile Documents/iCloud~md~obsidian/Documents/卡片筆記盒模板/農產品追蹤"
  daily_report_dir: "daily-report"
  automation_dir: "/Users/yuukilin/.codex/automations/daily-agri-check"

do_not_update:
  - ethanol-parity-tracker.md

required_trackers:
  - enso-tracker.md
  - sugar-tracker.md
  - global-monitor-tracker.md
  - palm-oil-tracker.md
  - crop-progress-tracker.md
  - cocoa-tracker.md
  - coffee-tracker.md
  - cotton-tracker.md
  - wasde-tracker.md
  - plantings-stocks-tracker.md
  - export-sales-tracker.md
  - drought-monitor-tracker.md

event_monitor:
  fresh_signal_hours: 48
  active_event_lookback_days: 7
  headline_score: 8
  radar_score: 6
  require_official_for_high_impact: true
  high_impact_min_independent_sources: 3
  statuses: [new, worsening, unchanged, easing, closed]

price_anomaly_thresholds_daily_pct:
  sugar: 3.0
  corn: 3.0
  wheat: 3.0
  soybeans: 3.0
  cotton: 3.0
  coffee: 5.0
  cocoa: 5.0
  palm_oil: 3.0
  crude_oil: 4.0

source_policy:
  discovery_only: [Trading Economics, Barchart, social media]
  high_impact_requires_grade_a_or_explicit_gap: true
  unnamed_forecasts_cannot_be_consensus: true
  separate_humanitarian_and_crop_impact: true

sugar_five_factor_dashboard:
  - id: 1
    factor: El Nino 發展
    bullish_trigger: "NOAA 宣告 El Nino，或 Nino 3.4 >= +1.0C 且預測持續"
  - id: 2
    factor: 印度季風偏弱
    bullish_trigger: "IMD/Skymet 季風預報 < 96% LPA"
  - id: 3
    factor: 泰國乾旱
    bullish_trigger: "榨季產量 YoY 下滑 > 5%"
  - id: 4
    factor: 巴西糖佔比下滑
    bullish_trigger: "UNICA 糖佔比 < 45% 且持續下降，或糖價持續低於乙醇平價"
  - id: 5
    factor: 巴西物流瓶頸
    bullish_trigger: "Santos 排隊天數 > 30 天，或運費異常"

ethanol_parity_formula: "CEPEA_USD_m3 * 0.030 + 2.5"
