sugar_five_factor_dashboard:
  - id: 1
    factor: El Nino 發展
    bullish_trigger: "NOAA 宣告 El Nino，或 Nino 3.4 >= +1.0C 且預測持續"
  - id: 2
    factor: 印度季風偏弱
    bullish_trigger: "IMD/Skymet 季風預報 < 96% LPA"
  - id: 3
    factor: 泰國乾旱
    bullish_trigger: "榨季產量 YoY 下滑 > 5%"
  - id: 4
    factor: 巴西糖佔比下滑
    bullish_trigger: "UNICA 糖佔比 < 45% 且持續下降，或糖價持續低於乙醇平價"
  - id: 5
    factor: 巴西物流瓶頸
    bullish_trigger: "Santos 排隊天數 > 30 天，或運費異常"

ethanol_parity_formula: "CEPEA_USD_m3 * 0.030 + 2.5"
